<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Робочий час</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f2f4f7;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    height:48px;
    font-size:18px;
    padding:10px;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    height:52px;
    margin-top:25px;
    border:none;
    border-radius:12px;
    background:#1976d2;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.result{
    margin-top:25px;
    padding:15px;
    background:#e8f5e9;
    border-radius:12px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#1b5e20;
}
</style>
</head>

<body>

<div class="container">

<h1>Чистий час роботи</h1>

<label>Початок роботи</label>
<input type="time" id="start">

<label>Кінець роботи</label>
<input type="time" id="end">

<label>Пауза (хвилини)</label>
<input type="number" id="pause" inputmode="numeric" min="0" step="1" placeholder="0">

<label>Простій (хвилини)</label>
<input type="number" id="downtime" inputmode="numeric" min="0" step="1" placeholder="0">

<button onclick="calculate()">Порахувати</button>

<div class="result" id="result">
0 год 0 хв
</div>

</div>

<script>
function calculate(){

    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    let pause = parseInt(document.getElementById("pause").value) || 0;
    let downtime = parseInt(document.getElementById("downtime").value) || 0;

    if(!start || !end){
        document.getElementById("result").innerHTML =
        "Введи початок і кінець роботи";
        return;
    }

    const startParts = start.split(":");
    const endParts = end.split(":");

    let startMinutes =
        parseInt(startParts[0]) * 60 +
        parseInt(startParts[1]);

    let endMinutes =
        parseInt(endParts[0]) * 60 +
        parseInt(endParts[1]);

    // Нічна зміна
    if(endMinutes < startMinutes){
        endMinutes += 24 * 60;
    }

    let totalMinutes = endMinutes - startMinutes;

    let cleanMinutes =
        totalMinutes - pause - downtime;

    if(cleanMinutes < 0){
        cleanMinutes = 0;
    }

    let hours = Math.floor(cleanMinutes / 60);
    let minutes = cleanMinutes % 60;

    document.getElementById("result").innerHTML =
        hours + " год " + minutes + " хв";
}
</script>

</body>
</html>
